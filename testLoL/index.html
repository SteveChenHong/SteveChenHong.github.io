<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Cover Song of Steve</title>
    <style>
    body {
        margin: 0 0;
        background: url('http://fc07.deviantart.net/fs70/f/2013/174/3/e/recycled_texture_background_by_sandeep_m-d6aeau9.jpg') no-repeat center center fixed;
        background-size: cover;
        overflow: hidden;
    }
    
    #content {
        font-weight: bold;
        color: black;
        font-size: 500px;
        text-shadow: 10px 0 10px white, -10px 0 10px yellow, 0 -10px 10px blue, 0 10px 10px orange;
        ;
        font-family: 'Microsoft JhengHei';
        position: absolute;
        z-index: 1;
    }
    
    #wrapper {
        z-index: 0;
        position: absolute;
        left: -90%;
        top: -60%;
        background: url('image/background.png') no-repeat;
        background-size: 100% 100%;
        width: 350%;
        height: 350%;
        /*讓寬高一樣 */
        /*設定變形的基準點*/
        
        transform-origin: 50% 50%;
        /*animation Name*/
        
        animation-name: rotationBG;
        /*延遲多開始*/
        
        animation-delay: 0s;
        /*多長時間完成動畫*/
        
        animation-duration: 10s;
        /*變化是否往返(輪完重頭還是輪完反向還是反向輪播等等)*/
        /* -webkit-animation-direction: alternate-reverse;*/
        /*重複次數*/
        
        animation-iteration-count: infinite;
        /*變化過程速率*/
        
        animation-timing-function: linear;
    }
    
    @keyframes rotationBG {
        from {
            transform: rotate(0deg);
        }
        to {
            transform: rotate(360deg);
        }
    }
    </style>
</head>

<body>
    <div id="wrapper"></div>
    <div id="content">LOL</div>
</body>

</html>
